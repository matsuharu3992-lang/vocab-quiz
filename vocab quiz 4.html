const STORAGE_KEY = "vocab_quiz_progress";

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getWrongChoices(item, all) {
  return shuffle(all.filter(v => v.id !== item.id)).slice(0, 3).map(v => v.meaning);
}

function getWrongPhrases(item, all) {
  return shuffle(all.filter(v => v.id !== item.id)).slice(0, 3).map(v => v.phrase);
}

function buildQuestions(pool, count) {
  return shuffle(pool).slice(0, count).map(item => ({
    item, correct: item.meaning,
    choices: shuffle([item.meaning, ...getWrongChoices(item, VOCAB)]),
  }));
}

function buildFillQuestions(pool, count) {
  return shuffle(pool).slice(0, count).map(item => ({
    item, correct: item.phrase,
    choices: shuffle([item.phrase, ...getWrongPhrases(item, VOCAB)]),
  }));
}

function blankExample(example, blank) {
  const idx = example.toLowerCase().indexOf(blank.toLowerCase());
  if (idx === -1) return example;
  return example.slice(0, idx) + "________" + example.slice(idx + blank.length);
}

function HighlightedExample({ example, phrase }) {
  const core = phrase.replace(/\s*[\(\[].*?[\)\]]\s*/g, " ").trim();
  const words = core.split(/\s+/).filter(Boolean);
  const regex = new RegExp(`(${words.join("\\s+")})`, "i");
  const parts = example.split(regex);
  return (
    <span>
      {parts.map((part, i) =>
        regex.test(part)
          ? <span key={i} style={{background:"linear-gradient(135deg,#1d4ed8,#7c3aed)",color:"#fff",fontWeight:"800",borderRadius:"6px",padding:"2px 6px",margin:"0 1px"}}>{part}</span>
          : part
      )}
    </span>
  );
}

function StatCard({ label, value, color, onClick, clickable, clickColor }) {
  const bc = clickColor || "#f87171";
  return (
    <div onClick={onClick} style={{background:"#1e293b",borderRadius:"12px",padding:"14px 18px",textAlign:"center",minWidth:"70px",cursor:clickable?"pointer":"default",border:clickable?`2px solid ${bc}`:"2px solid transparent"}}>
      <div style={{fontSize:"24px",fontWeight:"800",color}}>{value}</div>
      <div style={{fontSize:"11px",color:"#64748b",marginTop:"2px"}}>{label}</div>
      {clickable && <div style={{fontSize:"9px",color:bc,marginTop:"3px"}}>タップして確認</div>}
    </div>
  );
}

function btnStyle(bg, outline=false) {
  return {background:outline?"transparent":bg,border:`2px solid ${bg}`,color:outline?bg:"#fff",borderRadius:"12px",padding:"13px 20px",fontSize:"14px",fontWeight:"600",cursor:"pointer",width:"100%"};
}

function VocabQuiz() {
  const allAnswersRef = useRef([]);
  const [mode, setMode] = useState("home");
  const [isRetry, setIsRetry] = useState(false);
  const [questionCount, setQuestionCount] = useState(10);
  const [sectionIdx, setSectionIdx] = useState(0);
  const [questions, setQuestions] = useState([]);
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState(0);
  const [allAnswers, setAllAnswers] = useState([]);
  const [progress, setProgress] = useState({});
  const [savedWrong, setSavedWrong] = useState([]);
  const [quizMode, setQuizMode] = useState("meaning");
  const [showWrongModal, setShowWrongModal] = useState(false);
  const [showMasteredModal, setShowMasteredModal] = useState(false);

  useEffect(() => {
    try {
      const p = localStorage.getItem(STORAGE_KEY);
      if (p) setProgress(JSON.parse(p));
      const w = localStorage.getItem(WRONG_KEY);
      if (w) setSavedWrong(JSON.parse(w));
    } catch(e) {}
  }, []);

  function saveAll(newProgress, newWrong) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(newProgress)); } catch(e) {}
    try { localStorage.setItem(WRONG_KEY, JSON.stringify(newWrong)); } catch(e) {}
  }

  function getPool(retry) {
    if (retry) return VOCAB.filter(v => savedWrong.includes(v.id));
    const sec = SECTIONS[sectionIdx];
    if (!sec.ids) return VOCAB;
    return VOCAB.filter(v => v.id >= sec.ids[0] && v.id <= sec.ids[1]);
  }

  function startQuiz(retry=false, qmode=quizMode) {
    setIsRetry(retry); setQuizMode(qmode);
    const pool = getPool(retry);
    const count = retry ? pool.length : (questionCount==="全" ? pool.length : Math.min(questionCount, pool.length));
    setQuestions(qmode==="fill" ? buildFillQuestions(pool,count) : buildQuestions(pool,count));
    allAnswersRef.current = [];
    setCurrent(0); setSelected(null); setScore(0); setAllAnswers([]);
    setMode("quiz");
  }

  function handleSelect(choice) {
    if (selected !== null) return;
    const q = questions[current];
    const isCorrect = choice === q.correct;
    const ans = {item:q.item, chosen:choice, correct:q.correct, isCorrect};
    allAnswersRef.current = [...allAnswersRef.current, ans];
    setSelected(choice);
    if (isCorrect) setScore(s => s+1);
    setAllAnswers([...allAnswersRef.current]);
  }

  function handleNext() {
    if (current+1 >= questions.length) {
      finishQuiz(allAnswersRef.current);
    } else {
      setCurrent(c => c+1); setSelected(null);
    }
  }

  function finishQuiz(answers) {
    const newProgress = {...progress};
    answers.forEach(a => {
      const id = a.item.id;
      if (!newProgress[id]) newProgress[id] = {correct:0, total:0};
      newProgress[id].total++;
      if (a.isCorrect) newProgress[id].correct++;
    });
    const wrongIds  = answers.filter(a => !a.isCorrect).map(a => a.item.id);
    const correctIds= answers.filter(a =>  a.isCorrect).map(a => a.item.id);
    const newMerged = Array.from(new Set([
      ...savedWrong.filter(id => !correctIds.includes(id)),
      ...wrongIds,
    ]));
    setProgress(newProgress);
    setSavedWrong(newMerged);
    setAllAnswers([...answers]);
    saveAll(newProgress, newMerged);
    setMode("result");
  }

  const masteredCount = Object.values(progress).filter(p => p.total>=2 && p.correct/p.total>=0.8).length;
  const incorrect = allAnswers.filter(a => !a.isCorrect);

  if (mode==="home") {
    const pool = getPool(false);
    return (
      <div style={{minHeight:"100vh",background:"#0f172a",color:"#f1f5f9",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px"}}>
        <div style={{fontSize:"12px",letterSpacing:"4px",color:"#94a3b8",textTransform:"uppercase",marginBottom:"6px"}}>英熟語テスト</div>

          <StatCard label="要復習" value={savedWrong.length} color="#f87171"
            onClick={savedWrong.length>0?()=>setShowWrongModal(true):undefined} clickable={savedWrong.length>0}/>
        </div>

        {showWrongModal && (
          <div onClick={()=>setShowWrongModal(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>

                <div><div style={{fontSize:"16px",fontWeight:"700"}}>要復習の単語</div><div style={{fontSize:"12px",color:"#f87171"}}>{savedWrong.length}語</div></div>
                <button onClick={()=>setShowWrongModal(false)} style={{background:"#334155",border:"none",color:"#94a3b8",borderRadius:"8px",padding:"6px 12px",cursor:"pointer"}}>✕ 閉じる</button>
              </div>
              {VOCAB.filter(v=>savedWrong.includes(v.id)).map(v=>(
                <div key={v.id} style={{background:"#0f172a",borderRadius:"12px",padding:"14px",marginBottom:"8px",borderLeft:"3px solid #f87171"}}>

                  <div style={{fontSize:"13px",color:"#f1f5f9",marginBottom:"4px"}}>{v.meaning}</div>
                  <div style={{fontSize:"12px",color:"#64748b"}}>{v.exampleJa}</div>
                </div>
              ))}
              <button onClick={()=>{setShowWrongModal(false);startQuiz(true);}} style={{...btnStyle("#f87171"),marginTop:"8px"}}>🔁 この{savedWrong.length}問を解き直す</button>
            </div>
          </div>
        )}

        {showMasteredModal && (
          <div onClick={()=>setShowMasteredModal(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
            <div onClick={e=>e.stopPropagation()} style={{background:"#1e293b",borderRadius:"20px 20px 0 0",padding:"20px",width:"100%",maxWidth:"480px",maxHeight:"80vh",overflowY:"auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
                <div><div style={{fontSize:"16px",fontWeight:"700"}}>習得済みの単語</div><div style={{fontSize:"12px",color:"#34d399"}}>{masteredCount}語</div></div>
                <button onClick={()=>setShowMasteredModal(false)} style={{background:"#334155",border:"none",color:"#94a3b8",borderRadius:"8px",padding:"6px 12px",cursor:"pointer"}}>✕ 閉じる</button>
              </div>
              {VOCAB.filter(v=>{const p=progress[v.id];return p&&p.total>=2&&p.correct/p.total>=0.8;}).map(v=>(
                <div key={v.id} style={{background:"#0f172a",borderRadius:"12px",padding:"14px",marginBottom:"8px",borderLeft:"3px solid #34d399"}}>

                  <div style={{fontSize:"13px",color:"#f1f5f9",marginBottom:"4px"}}>{v.meaning}</div>
                  <div style={{fontSize:"12px",color:"#64748b"}}>{v.exampleJa}</div>

              ))}
            </div>
          </div>
        )}

        <div style={{width:"100%",maxWidth:"360px",marginBottom:"14px"}}>

          </div>

  if (mode==="quiz") {

        <div style={{width:"100%",maxWidth:"480px",marginBottom:"14px"}}>
          {isRetry&&<div style={{fontSize:"11px",color:"#f87171",letterSpacing:"2px",textAlign:"center",marginBottom:"4px"}}>🔁 解き直しモード</div>}
          <div style={{display:"flex",justifyContent:"space-between",fontSize:"13px",color:"#94a3b8",marginBottom:"5px"}}>
            <span>{current+1} / {questions.length}</span><span>正解: {score}</span>
          </div>
          <div style={{height:"6px",background:"#1e293b",borderRadius:"4px"}}>
            <div style={{height:"100%",width:`${(current/questions.length)*100}%`,background:isRetry?"linear-gradient(90deg,#f87171,#f97316)":"linear-gradient(90deg,#3b82f6,#8b5cf6)",borderRadius:"4px",transition:"width 0.3s"}}/>
          </div>
        </div>

        <div style={{width:"100%",maxWidth:"480px",background:"linear-gradient(145deg,#1e293b,#0f1f35)",border:"1px solid #334155",borderRadius:"20px",padding:"22px",marginBottom:"14px"}}>
          <div style={{fontSize:"11px",letterSpacing:"3px",color:"#64748b",textTransform:"uppercase",marginBottom:"12px",textAlign:"center"}}>
            {quizMode==="fill"?"空欄に入る熟語は？":"この熟語の意味は？"}
          </div>
          {quizMode==="fill"?(
            <div style={{fontSize:"clamp(16px,4vw,22px)",fontWeight:"700",color:"#f1f5f9",lineHeight:1.8,textAlign:"center",marginBottom:"16px"}}>
              {blankExample(q.item.example,q.item.blank).split("________").map((part,i,arr)=>(
                <span key={i}>{part}{i<arr.length-1&&(
                  selected!==null
                    ?<span style={{background:"linear-gradient(135deg,#1d4ed8,#7c3aed)",color:"#fff",fontWeight:"800",borderRadius:"6px",padding:"2px 8px",margin:"0 2px"}}>{q.item.blank}</span>
                    :<span style={{background:"#334155",color:"#94a3b8",fontWeight:"800",borderRadius:"6px",padding:"2px 20px",margin:"0 2px",letterSpacing:"4px"}}>?</span>
                )}</span>
              ))}
            </div>
          ):(
            <div style={{fontSize:"clamp(16px,4vw,23px)",fontWeight:"700",color:"#f1f5f9",lineHeight:1.7,textAlign:"center",marginBottom:"16px"}}>
              <HighlightedExample example={q.item.example} phrase={q.item.phrase}/>
            </div>
          )}
          {quizMode==="meaning"&&<div style={{textAlign:"center",background:"#0f172a",borderRadius:"10px",padding:"7px 14px"}}><span style={{fontSize:"12px",color:"#94a3b8"}}>熟語：</span><span style={{fontSize:"13px",fontWeight:"700",color:"#a78bfa"}}> {q.item.phrase}</span></div>}
          {quizMode==="fill"&&<div style={{textAlign:"center",background:"#0f172a",borderRadius:"10px",padding:"7px 14px"}}><span style={{fontSize:"12px",color:"#94a3b8"}}>意味：</span><span style={{fontSize:"13px",color:"#94a3b8"}}> {q.item.meaning}</span></div>}
          {selected!==null&&(
            <div style={{marginTop:"14px",background:"#0f2a1a",border:"1px solid #166534",borderRadius:"12px",padding:"12px 14px"}}>
              <div style={{fontSize:"11px",letterSpacing:"2px",color:"#4ade80",marginBottom:"4px"}}>🇯🇵 日本語訳</div>
              <div style={{fontSize:"14px",color:"#f1f5f9",fontWeight:"600",lineHeight:1.6}}>{q.item.exampleJa}</div>
            </div>
          )}
        </div>

        <div style={{width:"100%",maxWidth:"480px",display:"flex",flexDirection:"column",gap:"7px"}}>
          {q.choices.map((c,i)=>{
            let bg="#1e293b",border="#334155",color="#f1f5f9";
            if(selected!==null){
              if(c===q.correct){bg="#064e3b";border="#34d399";color="#34d399";}
              else if(c===selected){bg="#450a0a";border="#f87171";color="#f87171";}
              else{color="#475569";}
            }
            return <button key={i} onClick={()=>handleSelect(c)} style={{background:bg,border:`2px solid ${border}`,color,borderRadius:"12px",padding:"12px 14px",fontSize:"13px",textAlign:"left",cursor:selected?"default":"pointer",lineHeight:1.5}}><span style={{marginRight:"8px",fontSize:"11px",opacity:0.5}}>{["A","B","C","D"][i]}</span>{c}</button>;
          })}
        </div>

        {selected!==null&&(
          <div style={{marginTop:"12px",width:"100%",maxWidth:"480px"}}>
            <div style={{background:isCorrect?"#064e3b":"#450a0a",border:`1px solid ${isCorrect?"#34d399":"#f87171"}`,borderRadius:"12px",padding:"12px",marginBottom:"8px",fontSize:"14px",color:isCorrect?"#34d399":"#f87171",textAlign:"center",fontWeight:"700"}}>
              {isCorrect?"✓ 正解！":`✗ 不正解 → ${q.correct}`}
            </div>
            <button onClick={handleNext} style={btnStyle(isRetry?"#f87171":"#3b82f6")}>
              {current+1>=questions.length?"結果を見る →":"次へ →"}
            </button>
          </div>
        )}
      </div>
    );
  }

  if (mode==="result") {
    const pct=allAnswers.length>0?Math.round((score/allAnswers.length)*100):0;
    return (
      <div style={{minHeight:"100vh",background:"#0f172a",color:"#f1f5f9",display:"flex",flexDirection:"column",alignItems:"center",padding:"24px"}}>
        <div style={{width:"100%",maxWidth:"480px"}}>
          {isRetry&&<div style={{textAlign:"center",fontSize:"12px",color:"#f87171",marginBottom:"6px"}}>🔁 解き直し結果</div>}
          <h2 style={{textAlign:"center",fontSize:"26px",fontWeight:"800",marginBottom:"6px"}}>結果</h2>
          <div style={{textAlign:"center",fontSize:"60px",fontWeight:"800",background:pct>=80?"linear-gradient(135deg,#34d399,#60a5fa)":pct>=50?"linear-gradient(135deg,#fbbf24,#f97316)":"linear-gradient(135deg,#f87171,#ec4899)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1}}>{pct}%</div>
          <div style={{textAlign:"center",color:"#94a3b8",fontSize:"15px",marginBottom:"28px"}}>{allAnswers.length}問中 {score}問正解</div>

          {incorrect.length>0?(
            <div style={{marginBottom:"20px"}}>
              <div style={{fontSize:"12px",letterSpacing:"2px",color:"#94a3b8",textTransform:"uppercase",marginBottom:"10px"}}>間違えた問題（{incorrect.length}問）</div>
              {incorrect.map((a,i)=>(
                <div key={i} style={{background:"#1e293b",borderRadius:"12px",padding:"14px",marginBottom:"8px",borderLeft:"3px solid #f87171"}}>
                  <div style={{fontSize:"clamp(13px,3vw,16px)",fontWeight:"700",color:"#f1f5f9",lineHeight:1.7,marginBottom:"6px"}}><HighlightedExample example={a.item.example} phrase={a.item.phrase}/></div>
                  <div style={{fontSize:"12px",color:"#94a3b8",marginBottom:"4px"}}>🇯🇵 {a.item.exampleJa}</div>
                  <div style={{fontSize:"12px",color:"#a78bfa",marginBottom:"2px"}}>熟語：{a.item.phrase}</div>
                  <div style={{fontSize:"12px",color:"#34d399"}}>✓ {a.item.meaning}</div>
                </div>
              ))}
            </div>
          ):isRetry?(
            <div style={{background:"#064e3b",border:"1px solid #34d399",borderRadius:"12px",padding:"14px",textAlign:"center",color:"#34d399",fontWeight:"600",marginBottom:"20px"}}>🎉 全問正解！苦手が克服されました！</div>
          ):null}

          <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
            <button onClick={()=>startQuiz(isRetry,quizMode)} style={btnStyle(isRetry?"#f87171":"#3b82f6")}>もう一度</button>
            {incorrect.length>0&&<button onClick={()=>startQuiz(true,quizMode)} style={btnStyle("#f97316")}>🔁 間違えた{incorrect.length}問を解き直す</button>}
            <button onClick={()=>setMode("home")} style={btnStyle("#475569",true)}>ホームへ</button>
          </div>
        </div>
      </div>
    );
  }

  if (mode==="ranking") {
    const ranked=VOCAB.filter(v=>progress[v.id]&&progress[v.id].total>0).map(v=>{const p=progress[v.id];return {...v,correct:p.correct,total:p.total,rate:Math.round((p.correct/p.total)*100)};}).sort((a,b)=>a.rate-b.rate||b.total-a.total);
    return (
      <div style={{minHeight:"100vh",background:"#0f172a",color:"#f1f5f9",padding:"20px"}}>
        <div style={{maxWidth:"480px",margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"20px"}}>
            <button onClick={()=>setMode("home")} style={{background:"#1e293b",border:"none",color:"#94a3b8",borderRadius:"8px",padding:"8px 14px",cursor:"pointer"}}>← 戻る</button>
            <h2 style={{margin:0,fontSize:"18px",fontWeight:"700"}}>📊 苦手度ランキング</h2>
          </div>
          {ranked.length===0?(
            <div style={{textAlign:"center",color:"#64748b",padding:"40px 0"}}><div style={{fontSize:"40px",marginBottom:"12px"}}>📝</div><div>まだテストを解いていません。</div></div>
          ):ranked.map((v,i)=>{
            const bc=v.rate<40?"#f87171":v.rate<70?"#fbbf24":"#34d399";
            return (
              <div key={v.id} style={{background:"#1e293b",borderRadius:"12px",padding:"14px",marginBottom:"8px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px"}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"3px"}}>
                      <span style={{fontSize:"13px",fontWeight:"800",color:i<3?"#f87171":"#475569",minWidth:"24px"}}>#{i+1}</span>
                      <span style={{fontWeight:"700",fontSize:"14px",color:"#a78bfa"}}>{v.phrase}</span>
                    </div>
                    <div style={{fontSize:"12px",color:"#94a3b8",marginLeft:"32px"}}>{v.meaning}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0,marginLeft:"12px"}}>
                    <div style={{fontSize:"20px",fontWeight:"800",color:bc}}>{v.rate}%</div>
                    <div style={{fontSize:"11px",color:"#64748b"}}>{v.correct}/{v.total}問</div>
                  </div>
                </div>
                <div style={{height:"4px",background:"#0f172a",borderRadius:"4px",overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${v.rate}%`,background:bc,borderRadius:"4px"}}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  if (mode==="review") {
    const secs=[{title:"Section 1　自動詞＋前置詞＋A",range:[1,33]},{title:"Section 2　他動詞＋A＋前置詞＋B",range:[34,43]},{title:"Section 3　3語以上の動詞句",range:[44,68]},{title:"Section 4　be＋形容詞＋前置詞＋A",range:[69,96]},{title:"Section 5　前置詞＋A",range:[97,136]},{title:"Section 6　群前置詞",range:[137,152]},{title:"Section 7　副詞句を中心とした熟語",range:[153,163]},{title:"Section 8　動詞を中心とした熟語",range:[164,205]}];
    return (
      <div style={{minHeight:"100vh",background:"#0f172a",color:"#f1f5f9",padding:"20px"}}>
        <div style={{maxWidth:"480px",margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"20px"}}>
            <button onClick={()=>setMode("home")} style={{background:"#1e293b",border:"none",color:"#94a3b8",borderRadius:"8px",padding:"8px 14px",cursor:"pointer"}}>← 戻る</button>
            <h2 style={{margin:0,fontSize:"18px",fontWeight:"700"}}>単語一覧（全205語）</h2>
          </div>
          {secs.map(sec=>(
            <div key={sec.title}>
              <div style={{fontSize:"11px",letterSpacing:"2px",color:"#60a5fa",textTransform:"uppercase",margin:"16px 0 8px",padding:"6px 10px",background:"#0f1f35",borderRadius:"6px"}}>{sec.title}</div>
              {VOCAB.filter(v=>v.id>=sec.range[0]&&v.id<=sec.range[1]).map(v=>{
                const p=progress[v.id];
                const mastered=p&&p.total>=2&&p.correct/p.total>=0.8;
                const isWrong=savedWrong.includes(v.id);
                return (
                  <div key={v.id} style={{background:"#1e293b",borderRadius:"10px",padding:"12px",marginBottom:"6px",borderLeft:`3px solid ${mastered?"#34d399":isWrong?"#f87171":"#334155"}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:"700",fontSize:"13px",color:"#a78bfa",marginBottom:"2px"}}>{v.phrase}</div>
                        <div style={{color:"#f1f5f9",fontSize:"12px",marginBottom:"3px"}}>{v.meaning}</div>
                        <div style={{fontSize:"12px",lineHeight:1.6,marginBottom:"2px"}}><HighlightedExample example={v.example} phrase={v.phrase}/></div>
                        <div style={{color:"#64748b",fontSize:"11px"}}>{v.exampleJa}</div>
                      </div>
                      <div style={{textAlign:"right",marginLeft:"10px",flexShrink:0}}>
                        {isWrong&&<div style={{fontSize:"10px",color:"#f87171",marginBottom:"2px"}}>要復習</div>}
                        {p?<div style={{fontSize:"11px",color:mastered?"#34d399":"#64748b"}}>{p.correct}/{p.total}</div>:<div style={{fontSize:"10px",color:"#334155"}}>未出題</div>}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<VocabQuiz/>);
  </script>
</body>
</html>
